name: Python check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  basic-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lightweight check dependencies
        run: python -m pip install pillow numpy

      - name: Compile Python files
        run: python -m compileall -q dlss_like_super_resolution.py dlss_like_super_resolution_gui.py

      - name: Check command line help
        run: python dlss_like_super_resolution.py --help
