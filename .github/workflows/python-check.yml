name: Python check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Syntax check
        run: python -m py_compile dlss_like_super_resolution.py dlss_like_super_resolution_gui.py install_gpu.py
      - name: Lightweight file check
        run: |
          python - <<'PY'
          from pathlib import Path
          bad = []
          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              parts = set(path.parts)
              if '.git' in parts:
                  continue
              suffix = path.suffix.lower()
              if '.venv' in parts or '__pycache__' in parts or suffix in {'.pyc', '.pyo'}:
                  bad.append(str(path))
              if path.parts[:1] == ('models',) and suffix in {'.pth', '.pt', '.onnx'}:
                  bad.append(str(path))
          if bad:
              raise SystemExit('Unexpected generated files:\n' + '\n'.join(bad))
          PY
