name: 功能建议
description: 提出新功能、界面改进或模型相关建议
title: "[建议] "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: 你希望增加什么
      description: 请直接描述想要的功能或改进。
      placeholder: 例如：增加批量输出格式选择。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 为什么需要
      description: 说明这个功能能解决什么使用问题。
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: 补充信息
      description: 可以上传截图、示例图片或其他参考。
    validations:
      required: false
